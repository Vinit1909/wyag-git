# fly.toml — Fly.io deployment configuration
# Deploy with: fly launch (first time) or fly deploy (subsequent)

app = "wyag-git"          # change this to your app name after `fly launch`
primary_region = "iad"    # closest region: iad=US-East, lhr=London, sin=Singapore

[build]
  # Fly.io auto-detects the Dockerfile in the project root

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https   = true
  auto_stop_machines  = true   # saves cost: stops when idle
  auto_start_machines = true   # wakes on first request
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

# Persistent volume — stores the /app/repos directory across deploys.
# Create with: fly volumes create repos_data --size 1 --region iad
[[mounts]]
  source      = "repos_data"
  destination = "/app/repos"
